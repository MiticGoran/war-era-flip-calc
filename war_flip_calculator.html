<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War Era Flip Calculator</title>
<style>
body{font-family:Arial,sans-serif;background:#111827;color:#fff;max-width:800px;margin:20px auto;padding:20px}
.card{background:#1f2937;padding:16px;border-radius:10px;margin-bottom:16px}
label{display:block;margin-top:10px}
input{width:100%;padding:8px;background:#374151;color:#fff;border:1px solid #555;border-radius:6px}
button{margin-top:15px;padding:10px 16px;border:none;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer}
.result div{margin:6px 0}
.green{color:#22c55e}.red{color:#ef4444}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:8px;border-bottom:1px solid #444}
.best{background:#374151;padding:10px;border-radius:8px;margin-bottom:10px}
</style>
</head>
<body>
<div class="card">
<h2>⚔ War Era Flip Calculator</h2>
<label>Product<input id="product" value="Weapon Q5"></label>
<label>Quantity<input id="qty" type="number" value="2500"></label>
<label>Buy Price<input id="buy" type="number" step="0.0001" value="4.35"></label>
<label>Sell Price<input id="sell" type="number" step="0.0001" value="4.80"></label>
<label>Market Fee (%)<input id="fee" type="number" step="0.1" value="5"></label>
<div class="result">
<div>Investment: <span id="investment"></span></div>
<div>Gross Sale: <span id="gross"></span></div>
<div>Fee: <span id="feeAmt"></span></div>
<div>Net Revenue: <span id="net"></span></div>
<div>Profit: <span id="profit"></span></div>
<div>Profit / Item: <span id="ppi"></span></div>
<div>ROI: <span id="roi"></span></div>
<div>Break-even: <span id="be"></span></div>
</div>
<button onclick="saveFlip()">💾 Save Flip</button>
<button onclick="clearHistory()">🗑 Clear History</button>
</div>
<div class="card">
<h3>History</h3>
<div>Total Profit: <span id="total"></span></div>
<div id="bestBox" class="best" style="display:none">
🏆 Best Flip: <span id="bestInfo"></span>
</div>
<table>
<thead><tr><th>Date</th><th>Product</th><th>Qty</th><th>Buy</th><th>Sell</th><th>Profit</th><th></th></tr></thead>
<tbody id="hist"></tbody>
</table>
</div>
<script>
const ids=["qty","buy","sell","fee","product"];
ids.forEach(i=>document.getElementById(i).addEventListener("input",calc));

function calc(){
let q=+qty.value||0,b=+buy.value||0,s=+sell.value||0,f=+fee.value||0;
let inv=q*b,g=q*s,fa=g*f/100,net=g-fa,p=net-inv;
investment.textContent=inv.toFixed(2);
gross.textContent=g.toFixed(2);
feeAmt.textContent=fa.toFixed(2);
net.textContent=net.toFixed(2);
profit.innerHTML='<span class="'+(p>=0?'green':'red')+'">'+p.toFixed(2)+'</span>';
ppi.textContent=(q?p/q:0).toFixed(4);
roi.textContent=(inv?100*p/inv:0).toFixed(2)+"%";
be.textContent=(q?(inv/(q*(1-f/100))):0).toFixed(4);
}

function getHist(){return JSON.parse(localStorage.getItem("weflips")||"[]")}

function render(){
let h=getHist(),tb=document.getElementById("hist"),tot=0;
tb.innerHTML="";

h.forEach((x,i)=>{
  tot+=x.p;
  tb.innerHTML+=`<tr>
    <td>${x.date}</td>
    <td>${x.n}</td>
    <td>${x.qty}</td>
    <td>${x.buy.toFixed(4)}</td>
    <td>${x.sell.toFixed(4)}</td>
    <td class="${x.p>=0?'green':'red'}">${x.p.toFixed(2)}</td>
    <td><button onclick="del(${i})">X</button></td>
  </tr>`;
});

total.textContent=tot.toFixed(2)+" Gold";

// najbolji flip (najveci profit)
if(h.length){
  let best=h.reduce((a,b)=>b.p>a.p?b:a,h[0]);
  bestBox.style.display="block";
  bestInfo.innerHTML=`${best.n} — <span class="green">${best.p.toFixed(2)} Gold</span> (qty: ${best.qty}, buy: ${best.buy.toFixed(4)}, sell: ${best.sell.toFixed(4)}, ${best.date})`;
}else{
  bestBox.style.display="none";
}
}

function saveFlip(){
let p=parseFloat(document.getElementById("profit").innerText);
let h=getHist();
h.push({
  n:product.value,
  p:p,
  qty:+qty.value||0,
  buy:+buy.value||0,
  sell:+sell.value||0,
  date:new Date().toLocaleString()
});
localStorage.setItem("weflips",JSON.stringify(h));
render();
}

function del(i){let h=getHist();h.splice(i,1);localStorage.setItem("weflips",JSON.stringify(h));render();}
function clearHistory(){localStorage.removeItem("weflips");render();}

calc();render();
</script>
</body></html>
